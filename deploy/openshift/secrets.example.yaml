# Template — copy, fill in real values, apply, and DO NOT commit the filled copy.
# (This example file is safe to commit; it contains only placeholders.)
#
#   cp secrets.example.yaml secrets.local.yaml
#   # edit secrets.local.yaml
#   oc apply -f secrets.local.yaml
#
# The TLS cert (zed-tls) and the collab schema (collab-schema ConfigMap) are
# created from files instead — see README.md.
apiVersion: v1
kind: Secret
metadata:
  name: zed-secrets
type: Opaque
stringData:
  # --- Postgres (consumed by the postgres image AND the app DSNs) ---
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "CHANGE-ME-db"
  POSTGRES_DB: "zed"
  # App reads these exact env names. Keep user/password/host in sync with above.
  AUTH_DATABASE_URL: "postgres://postgres:CHANGE-ME-db@postgres:5432/zed"
  COLLAB_DATABASE_URL: "postgres://postgres:CHANGE-ME-db@postgres:5432/zed"
  DATABASE_URL: "postgres://postgres:CHANGE-ME-db@postgres:5432/zed"   # collab

  # --- Shared secret between cloud and collab ---
  ZED_CLOUD_INTERNAL_API_KEY: "CHANGE-ME-internal-key"

  # --- GitLab OAuth (leave blank to fall back to the username form) ---
  GITLAB_CLIENT_ID: ""
  GITLAB_CLIENT_SECRET: ""

  # --- MinIO root creds == the S3 keys the app uses ---
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "CHANGE-ME-minio"
  S3_ACCESS_KEY_ID: "minioadmin"
  S3_SECRET_ACCESS_KEY: "CHANGE-ME-minio"
