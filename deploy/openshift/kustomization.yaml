# Applies the stack: oc apply -k deploy/openshift
#
# Prerequisites created out-of-band (see README) because they come from files
# and must not live in git:
#   - Secret     zed-secrets     (from secrets.local.yaml)
#   - Secret     zed-tls         (from your cert: server.crt / server.key)
#   - ConfigMap  collab-schema   (from ../zed/crates/collab/migrations)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - 01-postgres.yaml
  - 02-minio.yaml
  - 03-zed.yaml
  - 04-routes.yaml
