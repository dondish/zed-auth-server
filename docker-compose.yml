# Self-hosted Zed collaboration stack.
#
#   postgres  — collab's database (schema auto-loaded from the repo's dump)
#   cloud     — the FastAPI auth/cloud stand-in (this project)
#   collab    — Zed's collaboration server, built from ../zed
#
# collab's cloud URL is hardcoded to http://localhost:8787 in development mode
# (crates/collab/src/lib.rs), so `collab` shares `cloud`'s network namespace
# (network_mode: service:cloud) — that makes localhost:8787 resolve to the
# cloud container, and lets collab reach postgres through cloud's DNS.
#
# Because of that shared namespace, collab's HTTP port (8080) is published by
# the `cloud` service, not by `collab`.
#
# Prerequisites:
#   1. Generate certs on the host:  python gen_certs.py --hostname zed.dondish.me
#   2. The Zed repo must be checked out at ../zed (sibling of this project).

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zed
    volumes:
      - pgdata:/var/lib/postgresql/data
      # The schema dump runs once, on first initialization of the volume.
      - ../zed/crates/collab/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zed"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [zednet]

  cloud:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ZED_CLOUD_INTERNAL_API_KEY: "${INTERNAL_API_KEY:-internal-api-key-secret}"
      # User/token store. Uses its own `auth` schema in the same Postgres, so it
      # coexists with collab's `public` tables. Unset it to fall back to
      # /data/state.json.
      AUTH_DATABASE_URL: "postgres://postgres:postgres@postgres:5432/zed"
      # Mirrors signed-in users into collab's `public.users` (FK constraints).
      COLLAB_DATABASE_URL: "postgres://postgres:postgres@postgres:5432/zed"
      # Where GET /rpc sends clients for the collab websocket. Defaults to
      # http://<request-host>:8080/rpc; override if clients reach collab
      # under a different host/port than they reach this server.
      COLLAB_RPC_URL: "${COLLAB_RPC_URL:-}"
      RELEASES_DIR: "/releases"
      EXTENSIONS_DIR: "/extensions"
      ACP_DIR: "/acp"
      # GitLab-backed sign-in. Leave CLIENT_ID/SECRET empty to keep the
      # password-less username form. GITLAB_URL may point at a self-hosted
      # instance. REDIRECT_URI must match the callback registered on the GitLab
      # OAuth app, e.g. https://zed.dondish.me:8443/auth/gitlab/callback.
      GITLAB_URL: "${GITLAB_URL:-https://gitlab.com}"
      GITLAB_CLIENT_ID: "${GITLAB_CLIENT_ID:-}"
      GITLAB_CLIENT_SECRET: "${GITLAB_CLIENT_SECRET:-}"
      GITLAB_REDIRECT_URI: "${GITLAB_REDIRECT_URI:-}"
      # Releases + extensions are stored in S3/MinIO; the server streams the
      # bytes back through its own HTTPS listener (MinIO isn't exposed to
      # clients). Unset S3_ENDPOINT_URL/S3_BUCKET to use the local dir mounts.
      S3_ENDPOINT_URL: "http://minio:9000"
      S3_BUCKET: "${S3_BUCKET:-zed-assets}"
      S3_REGION: "${S3_REGION:-us-east-1}"
      S3_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-minioadmin}"
      S3_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    volumes:
      - ./certs:/certs:ro
      - clouddata:/data
      # Local-mode fallback mounts (unused when S3 is configured above).
      - ./releases:/releases:ro
      - ./extensions:/extensions:ro
      - ./acp:/acp:ro
    ports:
      - "8443:8443"   # client-facing HTTPS  (Zed's server_url)
      - "8080:8080"   # collab RPC websocket (served by the collab container)
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [zednet]

  # S3-compatible object storage for release installers + extension archives.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"   # S3 API (used by scrape_*.py from the host)
      - "9001:9001"   # web console
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [zednet]

  # One-shot: create the bucket on first boot, then exit.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 '${MINIO_ROOT_USER:-minioadmin}' '${MINIO_ROOT_PASSWORD:-minioadmin}' &&
      mc mb --ignore-existing local/${S3_BUCKET:-zed-assets} &&
      echo 'bucket ready';
      "
    networks: [zednet]

  collab:
    build:
      # Context is the Zed source tree (collab compiles the whole workspace);
      # the Dockerfile is vendored in this repo (path is relative to context).
      context: ../zed
      dockerfile: ../zed-auth-server/Dockerfile-collab
    # Share the cloud container's network stack so collab's hardcoded
    # http://localhost:8787 cloud URL reaches the cloud service.
    network_mode: "service:cloud"
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/zed"
      DATABASE_MAX_CONNECTIONS: "5"
      HTTP_PORT: "8080"
      ZED_ENVIRONMENT: "development"
      ZED_CLOUD_INTERNAL_API_KEY: "${INTERNAL_API_KEY:-internal-api-key-secret}"
      RUST_LOG: "info"
    command: ["serve", "collab"]
    depends_on:
      postgres:
        condition: service_healthy
      cloud:
        condition: service_started

volumes:
  pgdata:
  clouddata:
  miniodata:

networks:
  zednet:
